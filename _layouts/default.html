<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<style>body{font-family:monospace;max-width:72ch;margin:0 auto;padding:0 2ch;line-height:1.6}h1,h2,h3,h4,h5,h6,ul,ol,blockquote,pre{font-size:1em}a{color:blue;}</style>
</head>
<body>
<p><a href="/">{{ site.title }}</a>{% for item in site.nav %} / <a href="{{ item.url }}">{{ item.title }}</a>{% endfor %}</p>
<p class="rule"></p>
{{ content }}
<p class="rule"></p>
<p>&copy; {{ 'now' | date: "%Y" }} {{ site.author | default: site.title }}</p>
<script>
function setRules(){
  var s=document.createElement('span');
  s.textContent='=';
  s.style.cssText='visibility:hidden;position:absolute;white-space:nowrap';
  document.body.appendChild(s);
  var chPx=s.offsetWidth;
  document.body.removeChild(s);
  var st=getComputedStyle(document.body);
  var w=document.body.clientWidth-parseFloat(st.paddingLeft)-parseFloat(st.paddingRight);
  var n=Math.floor(w/chPx);
  var line='='.repeat(n);
  document.querySelectorAll('.rule').forEach(function(el){el.textContent=line});
}
setRules();
window.addEventListener('resize',setRules);
</script>
</body>
</html>
